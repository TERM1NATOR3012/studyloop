<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#007AFF" />
  <title>StudyLoop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./assets/css/app.css" />

  <!-- XLSX + PDF libs (cached by service worker after first load) -->
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
  <div id="app" class="appShell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brandTitle">StudyLoop</div>
        <div class="brandSub">Spaced repetition planner</div>
      </div>

      <nav class="nav">
        <button class="navItem isActive" data-page="today">Today</button>
        <button class="navItem" data-page="calendar">Calendar</button>
        <button class="navItem" data-page="upcoming">Upcoming</button>
        <button class="navItem" data-page="topics">Topics</button>
        <button class="navItem" data-page="homework">Homework</button>
        <button class="navItem" data-page="subjects">Subjects</button>
        <button class="navItem" data-page="dashboard">Dashboard</button>
        <button class="navItem" data-page="settings">Settings</button>
      </nav>

      <div class="sidebarFooter">
        <div class="muted">Offline PWA • v1.0</div>
      </div>
    </aside>

    <main class="main">
      <div id="updateBanner" class="updateBanner hidden">
        <div>Update available.</div>
        <button id="reloadBtn" class="btn btnPrimary">Reload</button>
      </div>

      <!-- Pages -->
      <section class="page isVisible" id="page-today"></section>
      <section class="page" id="page-calendar"></section>
      <section class="page" id="page-upcoming"></section>
      <section class="page" id="page-topics"></section>
      <section class="page" id="page-homework"></section>
      <section class="page" id="page-subjects"></section>
      <section class="page" id="page-dashboard"></section>
      <section class="page" id="page-settings"></section>
    </main>
  </div>

  <!-- Modal host -->
  <div id="modalHost" class="modalHost hidden" aria-hidden="true"></div>

  <script type="module" src="./assets/js/app.js"></script>
</body>

</html>
